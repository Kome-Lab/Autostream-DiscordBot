services:
  discord-bot:
    environment:
      AUTOSTREAM_NODE_CONFIG: /etc/autostream-discord-bot/config.yml
      SERVICE_VERSION: 0.1.0-local
      CONTROL_PANEL_HEARTBEAT_INTERVAL_SEC: 5
      ENCODER_AUDIO_TOKEN: dev-only-discord-audio-token
      AUTOSTREAM_BIND_ADDR: 0.0.0.0:8080
      DISCORD_BOT_TOKEN: ""
      TZ: Asia/Tokyo
    ports: !override
      - "8083:8080"
    volumes: !override
      - ./config/config.yml:/etc/autostream-discord-bot/config.yml:ro
