services:
  discord-bot:
    image: ${AUTOSTREAM_IMAGE_REGISTRY:-ghcr.io/kome-lab/autostream-docker}/discord-bot:${AUTOSTREAM_DOCKER_VERSION:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      AUTOSTREAM_BIND_ADDR: 0.0.0.0:8080
    ports: !override
      - "127.0.0.1:8083:8080"
